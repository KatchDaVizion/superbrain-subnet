name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      # Install the slim test-only set first so collection + most tests run fast.
      # bittensor is installed afterwards; if it fails, only the ~20 tests that
      # import bittensor will be skipped (see --runxfail).
      - name: Install slim test deps
        run: pip install pytest pytest-asyncio pydantic pynacl httpx requests

      - name: Collect all tests (syntax/import sanity — fast signal)
        run: pytest tests/unit --collect-only -q

      - name: Install full project requirements
        run: pip install -r requirements.txt

      - name: Run unit tests (full suite)
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONUNBUFFERED: "1"
        run: pytest tests/unit -v --tb=short --durations=10
